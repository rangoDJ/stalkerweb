name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Lint & Test backend ───────────────────────────────────────────────────
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Lint & Test frontend ──────────────────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── Build Android debug APKs (mobile + tv) ──────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APKs (mobile + tv)
        working-directory: android
        run: gradle :app:assembleMobileDebug :app:assembleTvDebug

      - name: Upload mobile APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-mobile-debug
          path: android/app/build/outputs/apk/mobile/debug/app-mobile-debug.apk
          retention-days: 7

      - name: Upload tv APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-tv-debug
          path: android/app/build/outputs/apk/tv/debug/app-tv-debug.apk
          retention-days: 7

  # ── Auto-tag on main after all checks pass ──────────────────────────────
  auto-tag:
    needs: [backend-check, frontend-check, build-apk, build-docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and push tag
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  # ── Build & push Docker image ────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
