name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Extract version from tag ───────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  # ── Build Android APKs (mobile + tv) ────────────────────────────────────────
  build-apk:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/debug.keystore

      - name: Build APKs (mobile + tv)
        working-directory: android
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          VERSION_CLEAN="${VERSION#v}"
          gradle :app:assembleMobileRelease :app:assembleTvRelease -PversionName="$VERSION_CLEAN"

      - name: Upload mobile APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-mobile-apk
          path: android/app/build/outputs/apk/mobile/release/app-mobile-release.apk
          retention-days: 30

      - name: Upload tv APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-tv-apk
          path: android/app/build/outputs/apk/tv/release/app-tv-release.apk
          retention-days: 30

  # ── Build & push Docker image ────────────────────────────────────────────
  build-docker:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [version, build-apk, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download mobile APK
        uses: actions/download-artifact@v4
        with:
          name: stalkerweb-mobile-apk

      - name: Download tv APK
        uses: actions/download-artifact@v4
        with:
          name: stalkerweb-tv-apk

      - name: Rename artifacts to include version
        run: |
          mv app-mobile-release.apk stalkerweb-mobile-${{ needs.version.outputs.tag }}.apk
          mv app-tv-release.apk     stalkerweb-tv-${{ needs.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            stalkerweb-mobile-${{ needs.version.outputs.tag }}.apk
            stalkerweb-tv-${{ needs.version.outputs.tag }}.apk
          body: |
            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version.outputs.tag }}
            ```

            ## Android APKs

            | APK | Target |
            |-----|--------|
            | `stalkerweb-mobile-${{ needs.version.outputs.tag }}.apk` | Phone / tablet (Android 8.0+) |
            | `stalkerweb-tv-${{ needs.version.outputs.tag }}.apk` | FireTV / Android TV / Google TV |

            Enable **Install from unknown sources** before sideloading.
