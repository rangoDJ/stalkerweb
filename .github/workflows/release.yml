name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Generate Version Tag ───────────────────────────────────────────────────
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_action.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Bump version and push tag
        id: tag_action
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

  # ── Build Android debug APK ──────────────────────────────────────────────
  build-apk:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore signing keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK
        working-directory: android
        run: |
          VERSION="${{ needs.tag.outputs.new_tag }}"
          VERSION_CLEAN="${VERSION#v}"
          gradle :app:assembleDebug -PversionName="$VERSION_CLEAN"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Build & push Docker image ────────────────────────────────────────────
  build-docker:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [tag, build-apk, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: stalkerweb-apk

      - name: Rename APK to include version
        run: mv app-debug.apk stalkerweb-${{ needs.tag.outputs.new_tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: stalkerweb-${{ needs.tag.outputs.new_tag }}.apk
          body: |
            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.tag.outputs.new_tag }}
            ```

            ## Android APK

            Download `stalkerweb-${{ needs.tag.outputs.new_tag }}.apk` from the assets below.
            Requires Android 8.0+ (API 26). Enable **Install from unknown sources** before sideloading.
