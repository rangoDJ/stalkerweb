name: Release

on:
  push:
    tags: ['v*.*', 'v*.*.*']

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Build Android debug APK ──────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: android
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gradle :app:assembleDebug -PversionName="$VERSION"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stalkerweb-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Build & push Docker image ────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-apk, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: stalkerweb-apk

      - name: Rename APK to include version
        run: mv app-debug.apk stalkerweb-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: stalkerweb-${{ github.ref_name }}.apk
          body: |
            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Android APK

            Download `stalkerweb-${{ github.ref_name }}.apk` from the assets below.
            Requires Android 8.0+ (API 26). Enable **Install from unknown sources** before sideloading.
