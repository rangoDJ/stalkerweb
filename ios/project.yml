name: StalkerWeb
options:
  bundleIdPrefix: com.stalkerweb
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: "NO"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  StalkerWeb:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StalkerWeb
    info:
      path: StalkerWeb/Info.plist
      properties:
        CFBundleName: StalkerWeb
        CFBundleDisplayName: StalkerWeb
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        AVPlayerUsesExternalPlaybackWhileExternalScreenIsActive: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stalkerweb.ios
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: StalkerWeb/Info.plist
